name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System deps (poppler for rendering)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install
        run: pip install -e ".[mcp]" pytest

      - name: Python tests
        run: pytest -q

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Editor JS test
        run: node pdf_fill_studio/editor/coords.test.mjs
