<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>pdf-fill-studio</title>
  <style>
    body { margin: 0; font: 14px system-ui, sans-serif; display: flex; }
    #sidebar { width: 260px; padding: 12px; border-right: 1px solid #ddd; height: 100vh; overflow: auto; }
    #stage { flex: 1; padding: 16px; overflow: auto; background: #f4f4f5; }
    .pagewrap { position: relative; margin: 0 auto 24px; box-shadow: 0 1px 6px rgba(0,0,0,.2); }
    .pagewrap canvas { display: block; }
    .box { position: absolute; border: 1px solid #2563eb; background: rgba(37,99,235,.08);
           font: 12px monospace; padding: 1px 2px; cursor: move; white-space: nowrap; }
    .box.signature { border: 1px dashed #999; background: repeating-linear-gradient(
      45deg, transparent, transparent 4px, rgba(0,0,0,.05) 4px, rgba(0,0,0,.05) 8px); cursor: not-allowed; }
    .box.selected { outline: 2px solid #f59e0b; }
    button { font: 14px system-ui; padding: 8px 12px; cursor: pointer; }
    label { display: block; margin: 6px 0 2px; font-size: 12px; color: #444; }
    input { width: 100%; box-sizing: border-box; padding: 4px; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h3>Champs</h3>
    <div id="fields"></div>
    <hr />
    <button id="export">Exporter le PDF</button>
    <p id="status" style="color:#666"></p>
  </div>
  <div id="stage"></div>
  <script type="module" src="./editor.js"></script>
</body>
</html>
